<!DOCTYPE html>
<html>
<head>
    <title>PopularTracks</title>
</head>
<body>
    <div id="PopularTracksConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div class="content-primary">
                <form class="PopularTracksConfigForm">
                    <div class="inputContainer">
                        <label for="LastFmApiKey">Last.fm API Key:</label>
                        <input id="LastFmApiKey" name="LastFmApiKey" type="text" is="emby-input" />
                        <div class="fieldDescription">Get a free key at last.fm/api. Required to read artist popularity.</div>
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input id="Enabled" name="Enabled" type="checkbox" is="emby-checkbox" />
                            <span>Re-order the artist "Popular" list by Last.fm popularity</span>
                        </label>
                    </div>
                    <div class="checkboxContainer checkboxContainer-withDescription">
                        <label>
                            <input id="CollapseDuplicates" name="CollapseDuplicates" type="checkbox" is="emby-checkbox" />
                            <span>Collapse duplicate copies of the same song (show each once)</span>
                        </label>
                    </div>
                    <div class="inputContainer">
                        <label for="CacheTtlHours">Cache lifetime (hours):</label>
                        <input id="CacheTtlHours" name="CacheTtlHours" type="number" min="1" max="720" is="emby-input" />
                        <div class="fieldDescription">How long a fetched artist top-tracks list is reused before refetching from Last.fm.</div>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var PopularTracksConfig = {
                pluginUniqueId: 'f24f31a3-b1a9-4f70-97c9-4b25a8863a59'
            };

            document.querySelector('.PopularTracksConfigForm')
                .addEventListener('submit', function (e) {
                    e.preventDefault();
                    Dashboard.showLoadingMsg();

                    ApiClient.getPluginConfiguration(PopularTracksConfig.pluginUniqueId).then(function (config) {
                        config.LastFmApiKey = document.querySelector('#LastFmApiKey').value;
                        config.Enabled = document.querySelector('#Enabled').checked;
                        config.CollapseDuplicates = document.querySelector('#CollapseDuplicates').checked;
                        config.CacheTtlHours = parseInt(document.querySelector('#CacheTtlHours').value);

                        ApiClient.updatePluginConfiguration(PopularTracksConfig.pluginUniqueId, config).then(function (result) {
                            Dashboard.processPluginConfigurationUpdateResult(result);
                        });
                    });

                    return false;
                });

            document.querySelector('#PopularTracksConfigPage').addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();

                ApiClient.getPluginConfiguration(PopularTracksConfig.pluginUniqueId).then(function (config) {
                    document.querySelector('#LastFmApiKey').value = config.LastFmApiKey || '';
                    document.querySelector('#Enabled').checked = config.Enabled !== false;
                    document.querySelector('#CollapseDuplicates').checked = config.CollapseDuplicates !== false;
                    document.querySelector('#CacheTtlHours').value = config.CacheTtlHours || 12;

                    Dashboard.hideLoadingMsg();
                });
            });
        </script>
    </div>
</body>
</html>
